{% load static %}
<form method="GET" action="{% url 'search_jobs' %}" class="search-form">
    <div class="search-form__field-group">
        <!-- Icon -->
        <svg class="search-form__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
        </svg>
        <input class="search-form__input" type="text" name="q" placeholder="Job title, keyword, or company" aria-label="Search keywords">
    </div>

    <div class="search-form__field-group">
        <!-- Icon -->
        <svg class="search-form__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" />
        </svg>
        <select class="search-form__input" name="category" aria-label="Select Category">
            <option value="" selected>All Categories</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="search-form__field-group">
        <!-- Icon -->
        <svg class="search-form__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
        </svg>
        <select class="search-form__input" name="state" id="id_state" aria-label="Select State">
            <option value="" selected>All Locations</option>
            {% for state in states %}
            <option value="{{ state.id }}">{{ state.name }}</option>
            {% endfor %}
        </select>
    </div>

    <button class="search-form__button" type="submit">Search</button>
</form>
