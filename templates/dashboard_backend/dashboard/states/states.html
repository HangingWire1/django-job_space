{% extends 'base.html' %}
{% block content %}
    <div class="row">
<!--        left sidebar-->
        {% include 'dashboard/sidebar.html' %}
<!--        right side content-->
        <div class="col-md-9">
            <h2>All States</h2>

            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" id="tableSearch" class="form-control" placeholder="Search for a state...">
                </div>
            </div>

            <a href="{% url 'add_state' %}" class="btn btn-dark text-light float-right mb-2">Add New</a>
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>#</th>
                  <th>State Name</th>
                  <th>Created At</th>
                  <th>Updated At</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
              {% for state in states %}
                <tr>
                  <td>{{ forloop.counter }}</td>
                  <td>{{ state }}</td>
                  <td>{{ state.created_at }}</td>
                  <td>{{ state.updated_at }}</td>
                    <td style="text-align: center;">
                        <a href="{% url 'edit_state' state.id %}" class="btn-icon text-primary" title="Edit">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a href="{% url 'delete_state' state.id %}" class="btn-icon text-danger" title="Delete"
                           onclick="return confirm('Are you sure you want to delete this category?')">
                            <i class="bi bi-trash3-fill"></i>
                        </a>
                    </td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
        </div>
    </div>

<script>
document.getElementById('tableSearch').addEventListener('keyup', function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll('tbody tr');

    rows.forEach(row => {
        // We check the second column (index 1) which contains the township name
        let text = row.cells[1].textContent.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
    });
});
</script>
{% endblock %}
