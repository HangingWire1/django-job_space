
{% extends "base.html" %}
{% load static %}
{% block title %}Home | JobBoard{% endblock %}

{% block content %}
<style>
    .hero-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        text-align: center;
        background-color: #f9f9f9;
    }

    .hero-container h1 {
        margin-bottom: 30px;
        font-size: 2rem;
        color: #333;
    }


    /* Individual segments */
    .search-input-field, .search-select, .search-btn {
        padding: 15px;
        border: none;
        outline: none;
        font-size: 1rem;
        height: 55px;
        box-sizing: border-box;
    }

    /* Borders between segments */
    .search-input-field, .search-select {
        border-right: 1px solid #333;
    }

    /* Width proportions */
    .search-input-field { flex: 2; } /* Keywords gets more space */
    .search-select { flex: 1; background-color: white; cursor: pointer; }
    .search-btn { 
        flex: 0.8; 
        background-color: #fff; 
        cursor: pointer; 
        text-decoration: underline; /* Matches the image text style */
        font-weight: bold;
        transition: background 0.2s;
    }

    .search-btn:hover {
        background-color: #f0f0f0;
    }

    /* Responsive: Stack on small screens */
    @media (max-width: 768px) {
        .search-group { flex-direction: column; border: none; }
        .search-input-field, .search-select, .search-btn {
            width: 100%;
            border: 1px solid #333;
            margin-bottom: 5px;
        }
    }
</style>

{% if active_page == 'employee' %}
<div class="hero-container">
    <h1>Find your next opportunity</h1>

<!--    search form-->
    {% include "includes/search_form.html" %}
</div>

<!--show related townships with state-->


{% else %}
<div class="hero-container">
    <h1>Make Hiring Easier</h1>
</div>
{% endif %}

{% endblock %}
